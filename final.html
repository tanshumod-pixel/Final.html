```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question For You</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff9ac2,#ffd6e7);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
padding:35px;
border-radius:20px;
text-align:center;
width:90%;
max-width:380px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

h1{
color:#ff2e75;
font-size:22px;
}

#message{
margin-top:10px;
color:#666;
font-style:italic;
height:24px;
}

.buttons{
margin-top:30px;
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:14px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

#yes{
background:#ff2e75;
color:white;
}

#no{
background:#ddd;
position:absolute;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0) rotate(0);}
100%{transform:translateY(800px) rotate(360deg);}
}

.firework{
position:fixed;
font-size:30px;
animation:boom 1s ease-out forwards;
}

@keyframes boom{
0%{transform:scale(0.2);opacity:1;}
100%{transform:scale(2);opacity:0;}
}

</style>
</head>

<body>

<div class="card" id="card">

<h1>
Should this awesome guy who sent you this link get a fair chance to know you better and take you out on a date!! 💫
</h1>

<div id="message"></div>

<div class="buttons">
<button id="yes" onclick="yesClicked()">Yes ❤️</button>
<button id="no">No 🙈</button>
</div>

</div>

<script>

let noBtn = document.getElementById("no");
let yesBtn = document.getElementById("yes");
let message = document.getElementById("message");

let scale = 1;

let teasing = [
"Are you sure? 😏",
"Think again...",
"Don't break his heart 🥺",
"You know you want to press YES 😄",
"Come on... give him a chance!"
];

function moveButton(){

let x = Math.random()*(window.innerWidth-100);
let y = Math.random()*(window.innerHeight-50);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

scale += 0.15;
yesBtn.style.transform="scale("+scale+")";

message.innerHTML = teasing[Math.floor(Math.random()*teasing.length)];
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function yesClicked(){

document.getElementById("card").innerHTML =
"<h1>🎉 Awesome choice!! 💖</h1><p>This might be the start of something fun 😉</p>";

celebrate();
}

function celebrate(){

setInterval(()=>{

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";
confetti.style.background=
["#ff2e75","#ffcc00","#00d4ff","#7dff7d","#ff6b6b"][Math.floor(Math.random()*5)];

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),3000);

},80);

setInterval(()=>{

let fire=document.createElement("div");
fire.className="firework";
fire.innerHTML="🎆";

fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*60+"vh";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

},400);

}

</script>

</body>
</html>
```
